# Simplified and corrected GitHub Actions workflow
name: babylon-features

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    # Cache the .tox directory
    - name: Cache tox environments
      uses: actions/cache@v4
      with:
        path: .tox
        # Generate a key based on OS, Python version, and hashes of dependency/config files
        key: ${{ runner.os }}-${{ matrix.python }}-tox-${{ hashFiles('pyproject.toml', 'tox.ini', 'poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.python }}-tox-

    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        pip install tox

    - name: Run checks with tox
      run: |
        # Run all specified checks. Tox will manage environment creation and installation.
        tox -e lint,format,pytest
