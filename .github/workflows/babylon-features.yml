# Simplified and modularized GitHub Actions workflow
name: babylon-features

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-tox
        with:
          python-version: "3.13"
      - name: Run linting
        run: tox -e lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-tox
        with:
          python-version: "3.13"
      - name: Run formatting check
        run: tox -e format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-tox
        with:
          python-version: "3.13"
      - name: Run type checking
        run: tox -e typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-tox
        with:
          python-version: "3.13"
      - name: Run tests
        run: tox -e pytest
