# GitHub Action for Building and Uploading Babylon Features Artifact
name: Babylon Features Artifact CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-tox
        with:
          python-version: "3.13"
          install-poetry: "true"

      - name: Run Artifact Upload Script
        env:
          BABYLON_API_GITHUB_PAT_TOKEN: ${{ secrets.BABYLON_PAT_CI }}
        run: |
          # The script will run tox -e dist and upload to GitHub Releases
          python artifact_upload.py --repo ${{ github.repository }} --tag ${{ github.ref }}
