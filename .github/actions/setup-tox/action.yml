name: 'Setup Python and Tox'
description: 'Sets up Python, installs tox and other dependencies, and caches the .tox directory.'
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.13'
  install-poetry:
    description: 'Whether to install poetry'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache tox environments
      uses: actions/cache@v5
      with:
        path: .tox
        key: ${{ runner.os }}-python-${{ inputs.python-version }}-tox-${{ hashFiles('pyproject.toml', 'tox.ini', 'poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-python-${{ inputs.python-version }}-tox-

    - name: Install tox and dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install tox
        if [ "${{ inputs.install-poetry }}" == "true" ]; then
          pip install poetry requests
        fi
